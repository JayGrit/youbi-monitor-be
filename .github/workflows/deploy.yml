name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: 服务器本地构建
    environment: prod
    runs-on: ubuntu-latest
    env:
      TXY_PRIVATE_KEY: ${{ secrets.TXY_PRIVATE_KEY }}
      TXY_HOST: 120.53.92.66
      TXY_USER: root
      TXY_PATH: /hoshuuch/youbi-monitor-be
    steps:
      - name: 配置SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${TXY_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_ed25519
          printf '\n' >> ~/.ssh/id_ed25519
          ssh-keyscan -H ${TXY_HOST} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519

      - name: 远程构建并启动容器
        run: |
          ssh -i ~/.ssh/id_ed25519 -o ServerAliveInterval=30 -o ServerAliveCountMax=20 "${TXY_USER}@${TXY_HOST}" "bash -s -- '${TXY_PATH}'" << 'EOF'
          set -Eeuo pipefail
          TXY_PATH="$1"

          if [ ! -d "${TXY_PATH}/.git" ]; then
            rm -rf "${TXY_PATH}"
            git clone git@github.com:JayGrit/youbi-monitor-be.git "${TXY_PATH}"
          fi

          cd "${TXY_PATH}"
          git fetch origin && git reset --hard origin/main
          printf 'nameserver 183.60.82.98\nnameserver 183.60.83.19\nnameserver 8.8.8.8\n' > /etc/resolv.conf
          docker rm -f monitor-be || true
          DOCKER_BUILDKIT=1 docker build -t monitor-be:latest .

          DOUYIN_CDP_URL=""
          if curl -fsS http://127.0.0.1:9333/json/version >/tmp/douyin-cdp-version.json 2>/dev/null; then
            DOUYIN_CDP_URL="$(python3 -c 'import json,sys; print(json.load(open("/tmp/douyin-cdp-version.json")).get("webSocketDebuggerUrl", ""))')"
          fi
          DOCKER_ENV_ARGS=()
          if [ -n "${DOUYIN_CDP_URL}" ]; then
            DOCKER_ENV_ARGS+=(-e "YDBI_DOUYIN_CDP_URL=${DOUYIN_CDP_URL}")
            echo "Douyin CDP URL detected; monitor-be will connect to existing Chrome."
          else
            echo "Douyin CDP URL not detected; monitor-be will use storage-state mode."
          fi
          DOCKER_ENV_ARGS+=(
            -e "YDBI_MONITOR_UPLOAD_WORK_DIR=/work/monitor-be/uploads"
            -e "YDBI_DOUYIN_BROWSER_UPLOAD_WORK_DIR=/hoshuuch/YouBi/workfolder/monitor-be/uploads"
            -e "YDBI_BILIBILI_PLAYWRIGHT_BROWSER_CHANNEL=chrome"
            -e "YDBI_BILIBILI_PLAYWRIGHT_HEADLESS=true"
            -e "YDBI_BILIBILI_PLAYWRIGHT_BROWSER_UPLOAD_WORK_DIR=/hoshuuch/YouBi/workfolder/monitor-be/uploads"
          )
          echo "Bilibili Playwright will launch system Chrome in headless mode."

          docker run -d \
            --name monitor-be \
            --network host \
            --restart unless-stopped \
            -v /hoshuuch/YouBi/workfolder:/work \
            "${DOCKER_ENV_ARGS[@]}" \
            monitor-be:latest

          docker logs monitor-be --tail 20
          EOF
