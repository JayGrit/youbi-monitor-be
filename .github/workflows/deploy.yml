name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: 服务器本地构建
    environment: prod
    runs-on: ubuntu-latest
    env:
      TXY_PRIVATE_KEY: ${{ secrets.TXY_PRIVATE_KEY }}
      TXY_HOST: 120.53.92.66
      TXY_USER: root
      TXY_PATH: /hoshuuch/youbi-monitor-be
    steps:
      - name: 配置SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${TXY_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_ed25519
          printf '\n' >> ~/.ssh/id_ed25519
          ssh-keyscan -H ${TXY_HOST} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519

      - name: 远程构建并启动容器
        run: |
          ssh -i ~/.ssh/id_ed25519 -o ServerAliveInterval=30 -o ServerAliveCountMax=20 "${TXY_USER}@${TXY_HOST}" \
            "bash -s -- '${TXY_PATH}' '${GITHUB_SHA}'" << 'EOF'
          set -Eeuo pipefail
          TXY_PATH="$1"
          RELEASE_TAG="$2"

          exec 9>/var/lock/youbi-docker-deploy.lock
          flock -w 1800 9

          if [ ! -d "${TXY_PATH}/.git" ]; then
            rm -rf "${TXY_PATH}"
            git clone git@github.com:JayGrit/youbi-monitor-be.git "${TXY_PATH}"
          fi

          cd "${TXY_PATH}"
          git fetch origin && git reset --hard origin/main
          printf 'nameserver 183.60.82.98\nnameserver 183.60.83.19\nnameserver 8.8.8.8\n' > /etc/resolv.conf
          OLD_MONITOR_BE_IMAGE="$(docker inspect -f '{{.Image}}' monitor-be 2>/dev/null || true)"
          RELEASE_IMAGE="monitor-be:${RELEASE_TAG}"

          if ! docker buildx inspect monitor-be-builder >/dev/null 2>&1; then
            docker buildx create \
              --name monitor-be-builder \
              --driver docker-container
          fi
          docker buildx inspect --bootstrap monitor-be-builder
          DOCKER_HUB_MIRRORS=(
            docker.m.daocloud.io
            docker.1ms.run
            docker.1panel.live
            ""
          )
          BUILD_OK=false
          for DOCKER_HUB_MIRROR in "${DOCKER_HUB_MIRRORS[@]}"; do
            if [ -n "${DOCKER_HUB_MIRROR}" ]; then
              MAVEN_IMAGE="${DOCKER_HUB_MIRROR}/library/maven:3.9-eclipse-temurin-17"
              RUNTIME_IMAGE="${DOCKER_HUB_MIRROR}/library/eclipse-temurin:17-jre"
              echo "Building monitor-be with Docker Hub mirror: ${DOCKER_HUB_MIRROR}"
            else
              MAVEN_IMAGE="maven:3.9-eclipse-temurin-17"
              RUNTIME_IMAGE="eclipse-temurin:17-jre"
              echo "Building monitor-be with Docker Hub directly."
            fi

            if docker buildx build \
              --builder monitor-be-builder \
              --load \
              --label youbi.service=monitor-be \
              --label "youbi.revision=${RELEASE_TAG}" \
              --build-arg "MAVEN_IMAGE=${MAVEN_IMAGE}" \
              --build-arg "RUNTIME_IMAGE=${RUNTIME_IMAGE}" \
              -t "${RELEASE_IMAGE}" \
              -t monitor-be:latest \
              .; then
              BUILD_OK=true
              break
            fi
          done
          if [ "${BUILD_OK}" != "true" ]; then
            echo "Failed to build monitor-be with all configured image sources."
            exit 1
          fi

          DOCKER_ENV_ARGS=()
          DOCKER_ENV_ARGS+=(
            -e "YDBI_MONITOR_UPLOAD_WORK_DIR=/work/monitor-be/uploads"
          )

          docker rm -f monitor-be || true
          docker run -d \
            --name monitor-be \
            --network host \
            --restart unless-stopped \
            -v /hoshuuch/YouBi/workfolder:/work \
            "${DOCKER_ENV_ARGS[@]}" \
            "${RELEASE_IMAGE}"

          MONITOR_HEALTHY=false
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8200/actuator/health >/dev/null 2>&1; then
              MONITOR_HEALTHY=true
              break
            fi
            sleep 2
          done
          if [ "${MONITOR_HEALTHY}" != "true" ]; then
            docker logs monitor-be --tail 100
            exit 1
          fi

          CURRENT_MONITOR_BE_IMAGE="$(docker inspect -f '{{.Image}}' monitor-be)"
          if [ -n "${OLD_MONITOR_BE_IMAGE}" ] \
            && [ "${OLD_MONITOR_BE_IMAGE}" != "${CURRENT_MONITOR_BE_IMAGE}" ]; then
            docker rmi -f "${OLD_MONITOR_BE_IMAGE}" || true
          fi
          docker image prune -f --filter "until=24h" || true

          prune_buildx_builder() {
            local builder_name="$1"
            local reserved_space="$2"
            if ! docker buildx inspect "${builder_name}" >/dev/null 2>&1; then
              return 0
            fi
            echo "Pruning buildx cache for ${builder_name}; reserved space: ${reserved_space}"
            docker buildx prune -af \
              --builder "${builder_name}" \
              --max-used-space 5gb \
              --min-free-space 10gb \
              --reserved-space "${reserved_space}" \
              || echo "Warning: docker buildx prune failed for ${builder_name}; deploy already completed."
          }

          prune_buildx_builder monitor-be-builder 2gb
          prune_buildx_builder default 5gb
          for BUILDER_NAME in $(docker buildx ls | awk 'NR > 1 && $1 !~ /^\\_/ {gsub(/\*/, "", $1); print $1}' | sort -u); do
            case "${BUILDER_NAME}" in
              default|monitor-be-builder) continue ;;
              *) prune_buildx_builder "${BUILDER_NAME}" 2gb ;;
            esac
          done
          docker system df || true
          EOF
