server:
  port: 8200

spring:
  application:
    name: monitor-be
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 201MB
  datasource:
    url: jdbc:mysql://120.53.92.66:3306/youbi?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: hoshuuch
    password: 490229
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 3000
      validation-timeout: 1000
      idle-timeout: 600000
      max-lifetime: 1500000
      keepalive-time: 300000

management:
  endpoints:
    web:
      exposure:
        include: health

youbi:
  operator:
    base-url: ${YDBI_OPERATOR_BASE_URL:http://127.0.0.1:8100/api}
    connect-timeout: ${YDBI_OPERATOR_CONNECT_TIMEOUT:PT3S}
    read-timeout: ${YDBI_OPERATOR_READ_TIMEOUT:PT15S}
  distributor:
    base-url: ${YDBI_DISTRIBUTOR_BASE_URL:http://127.0.0.1:8210}
  minio:
    endpoint: ${YDBI_MINIO_ENDPOINT:http://120.53.92.66:9000}
    access-key: ${YDBI_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${YDBI_MINIO_SECRET_KEY:minioadmin}
    bucket: ${YDBI_MINIO_BUCKET:ydbi}
    assets-bucket: ${YDBI_MINIO_ASSETS_BUCKET:youbi-assets}
    work-dir: ${YDBI_MONITOR_UPLOAD_WORK_DIR:${java.io.tmpdir}/ydbi/monitor-be/uploads}
  alidrive:
    topic: ${YDBI_ALIDRIVE_TOPIC:default}
    refresh-token: ${YDBI_ALIDRIVE_REFRESH_TOKEN:}
    work-dir: ${YDBI_ALIDRIVE_WORK_DIR:${java.io.tmpdir}/ydbi/monitor-be/alidrive}
